name: Build and upload assets
on:
  release:
    types: [ published ]

# The default GITHUB_TOKEN is read-only, so action-gh-release cannot attach
# assets ("Resource not accessible by integration"). Grant write to releases.
permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest = Apple Silicon (arm64); macos-13 = Intel (x86_64) so Intel Macs get a working build.
        os: [ ubuntu-latest, windows-latest, macos-latest, macos-13 ]
    name: Building, ${{ matrix.os }}
    steps:
      - name: Fix CRLF on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Build Outputs
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}


      - name: Build on Linux
        if: runner.os == 'Linux'
        # We're using musl to make the binaries statically linked and portable
        run: |
          # Run build script for musl toolchain
          source musl-toolchain/build.sh
          
          # Go back to the workspace
          cd $GITHUB_WORKSPACE
          
          # Build non-bridge binaries first (FireCash node + shielded wallet + miner)
          cargo --verbose build --bin kaspad --bin firecash-miner --bin firecash-walletd --bin shielded-pay --release --target x86_64-unknown-linux-musl
          # Build bridge with allow-multiple-definition to resolve mimalloc/libstdc++ symbol collisions.
          # musl-toolchain/build.sh sets RUSTFLAGS directly, so we append this flag here explicitly.
          export RUSTFLAGS="$RUSTFLAGS -C link-arg=-Wl,--allow-multiple-definition"
          cargo --verbose build --bin stratum-bridge --release --target x86_64-unknown-linux-musl
          mkdir bin || true
          cp target/x86_64-unknown-linux-musl/release/kaspad bin/
          cp target/x86_64-unknown-linux-musl/release/firecash-miner bin/
          cp target/x86_64-unknown-linux-musl/release/firecash-walletd bin/
          cp target/x86_64-unknown-linux-musl/release/shielded-pay bin/
          cp target/x86_64-unknown-linux-musl/release/stratum-bridge bin/
          archive="bin/firecash-${{ github.event.release.tag_name }}-linux-amd64.zip"
          zip -r "${archive}" ./bin/*
          echo "archive=${archive}" >> $GITHUB_ENV

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cargo build --bin kaspad --release
          cargo build --bin firecash-miner --release
          cargo build --bin firecash-walletd --release
          cargo build --bin shielded-pay --release
          cargo build --bin stratum-bridge --release
          mkdir bin || true
          cp target/release/kaspad.exe bin/
          cp target/release/firecash-miner.exe bin/
          cp target/release/firecash-walletd.exe bin/
          cp target/release/shielded-pay.exe bin/
          cp target/release/stratum-bridge.exe bin/
          archive="bin/firecash-${{ github.event.release.tag_name }}-win64.zip"
          powershell "Compress-Archive bin/* \"${archive}\""
          echo "archive=${archive}" >> $GITHUB_ENV

      - name: Build on MacOS
        if: runner.os == 'macOS'
        run: |
          cargo build --bin kaspad --release
          cargo build --bin firecash-miner --release
          cargo build --bin firecash-walletd --release
          cargo build --bin shielded-pay --release
          cargo build --bin stratum-bridge --release
          mkdir bin || true
          cp target/release/kaspad bin/
          cp target/release/firecash-miner bin/
          cp target/release/firecash-walletd bin/
          cp target/release/shielded-pay bin/
          cp target/release/stratum-bridge bin/
          # arch-tagged so the arm64 (macos-latest) and x86_64 (macos-13/Intel) archives don't collide.
          archive="bin/firecash-${{ github.event.release.tag_name }}-osx-$(uname -m).zip"
          zip -r "${archive}" ./bin/*
          echo "archive=${archive}" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./${{ env.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wasm:
    runs-on: ubuntu-latest
    name: Building WASM32 SDK
    steps:
      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install llvm
        id: install_llvm
        continue-on-error: true
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-get install -y clang-15 lldb-15 lld-15 clangd-15 clang-tidy-15 clang-format-15 clang-tools-15 llvm-15-dev lld-15 lldb-15 llvm-15-tools libomp-15-dev libc++-15-dev libc++abi-15-dev libclang-common-15-dev libclang-15-dev libclang-cpp15-dev libunwind-15-dev
          # Make Clang 15 default
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/lib/llvm-15/bin/clang++ 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/lib/llvm-15/bin/clang 100
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/lib/llvm-15/bin/clang-format 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/lib/llvm-15/bin/clang-tidy 100
          sudo update-alternatives --install /usr/bin/run-clang-tidy run-clang-tidy /usr/lib/llvm-15/bin/run-clang-tidy 100
          # Alias cc to clang
          sudo update-alternatives --install /usr/bin/cc cc /usr/lib/llvm-15/bin/clang 0
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/lib/llvm-15/bin/clang++ 0

      - name: Install gcc-multilib
        # gcc-multilib allows clang to find gnu libraries properly
        run: |
          sudo apt-get update
          sudo apt install -y gcc-multilib

      - name: Install stable toolchain
        if: steps.install_llvm.outcome == 'success' && steps.install_llvm.conclusion == 'success'
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NodeJS dependencies
        run: npm install --global typedoc typescript

      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM32 SDK
        run: |
          cd wasm
          bash build-release
          cd release
          zip -q -r kaspa-wasm32-sdk-${{ github.event.release.tag_name }}.zip kaspa-wasm32-sdk
          archive="wasm/release/kaspa-wasm32-sdk-${{ github.event.release.tag_name }}.zip"
          echo "archive=${archive}" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./${{ env.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
